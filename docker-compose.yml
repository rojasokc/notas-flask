services:

  mysql:
    image: mysql:8.4
    container_name: mysql-notas

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}

    #ports:
    #  - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  notas:
    build: .
    container_name: notas

    depends_on:
      - mysql

    ports:
      - "5000:5000"

    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}

    restart: unless-stopped

volumes:
  mysql_data: