<script>
    function actualizarFecha() {
        const hoy = new Date();
        const opciones = { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        };
        const fechaFormateada = hoy.toLocaleDateString('es-CO', opciones);
        document.getElementById('fecha-hoy').textContent = fechaFormateada;
    }

    actualizarFecha();
</script>
