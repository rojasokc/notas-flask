<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Título{% endblock %}</title>

    <!-- Bootstrap opcional (más bonito que CSS crudo) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<style>
/* ===== NAVBAR BASE ===== */
nav {
    background: #ffffff;
    border-bottom: 1px solid #e5e5e5;
}

nav ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

nav > ul {
    display: flex;
    gap: 1rem;
    padding: 0.75rem 1rem;
}

nav ul li {
    position: relative;
}

/* ===== LINKS PRINCIPALES ===== */
nav ul li > a {
    text-decoration: none;
    padding: 8px 14px;
    font-weight: 600;
    color: #333;
    border-radius: 6px;
    transition: background 0.2s ease, color 0.2s ease;
}

nav ul li > a:hover {
    background: #e7f1ff;
    color: #0d6efd;
}

/* ===== DROPDOWN PEGADO ===== */
nav ul li ul {
    display: none;
    position: absolute;
    top: 100%;           /* PEGADO */
    left: 0;
    margin-top: 0;       /* sin espacio */
    min-width: 220px;
    background: #ffffff;
    border-radius: 0 0 8px 8px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    padding: 6px 0;
    z-index: 1000;
}

/* Hover continuo */
nav ul li:hover > ul,
nav ul li ul:hover {
    display: block;
}

/* ===== ITEMS SUBMENU ===== */
nav ul li ul li a {
    display: block;
    padding: 8px 16px;
    font-weight: 500;
    color: #444;
}

nav ul li ul li a:hover {
    background: #caccd1;
    color: #0d6efd;
}

/* Separador */
nav ul li ul li hr {
    margin: 6px 0;
    border-color: #eaeaea;
}
</style>


<!-- Barra de navegación  {{ url_for('Gestionacade') }} -->



<div class="container">
    <!-- Aquí se injecta el contenido específico -->
    {% block content %}{% endblock %}
    {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}
</div>

<!-- Scripts opcionales -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
