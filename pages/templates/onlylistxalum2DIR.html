{% extends "base.html" %}

{% block title %}Profesores{% endblock %}

{% block content %}

<div class="mt-3 mb-3 p-3 bg-light border rounded shadow-sm">

    <h4 class="text-center text-primary mb-3">Notas por Asignatura</h4>
    {% if dirgrado %}
    <div class="row text-center">
        <div class="col-md-4">
            <strong>Grado:</strong> {{ dirgrado.name }}
        </div>
        <div class="col-md-4">
            <strong>Periodo Actual:</strong> {{ periodo }}
        </div>
        <div  class="col-md-4">
    
          <div class="mb-3">
            
            <select id="nivelSelect" class="form-select w-auto d-inline-block">
              <option value="">-- Seleccionar estudiante --</option>
              {% for estu in estugrado %}
                <option value="{{ estu.names }} {{estu.lastn}}" data-codeobse="{{ estu.scodeest }}" {% if nivel_actual == estu.scodeest %}selected{% endif %}>
                  {{estu.lastn}} {{ estu.lastn2}}, {{ estu.names }} 
                </option>
              {% endfor %}
            </select>
          </div>
        
        </div>  
    </div>
    {% else %}
        <p class="text-danger">No se encontró información de este grado.</p>
    {% endif %}
    </div>
    
    <table id="tablaPeriodos" class="table table-hover table-striped table-bordered " >
      <style>
      .oculto { display: none; }
      </style>
      <style>
            #gridNotasxestudiantexasignatura table th,
            #gridNotasxestudiantexasignatura table td {
            text-align: left !important;
        }
      </style>

      <style>
        .nivel-bajo {
            background-color: #f8d7da !important; /* rojo suave */
            color: #721c24;
            font-weight: bold;
            text-align: center;
        }
      </style>

        <thead class="table-dark">
           
        </thead>
        <tbody >
            <div id="gridNotasxestudiantexasignatura"></div>            

        </tbody>
    </table>

    <div class="mt-3 mb-3 p-3 bg-light border rounded shadow-sm">
    <h4 class="text-center text-primary mb-3">Notas por Area</h4>
    </div>
    <table id="tablanotasxarea" class="table table-hover table-striped table-bordered " >

      <style>
      .oculto { display: none; }
      </style>
      <style>
            #gridNotasxestudiantexarea table th,
            #gridNotasxestudiantexarea table td {
            text-align: left !important;
        }
      </style>
        <thead class="table-dark">
           <tr>
            
           </tr>
        </thead>
        <tbody >
            <div id="gridNotasxestudiantexarea"></div>            

        </tbody>
    </table>

<script>

document.getElementById("nivelSelect").addEventListener("change", function() {
    const codeestu = this.options[this.selectedIndex].dataset.codeobse;
    const codegrad = "{{ dirgrado.codegrad }}";  
    const periodo = "{{ periodo }}";  // PER2 o PER3

    if (!codeestu) {
        document.getElementById("gridNotasxestudiantexasignatura").innerHTML = "";
        return;
    }

    const url = `/get_notas_estudiante/${codegrad}/${codeestu}`;

    fetch(url)
        .then(response => response.json())
        .then(data => {
            renderGridNotas(data.notas, periodo);
            renderGridNotasArea(data.notasxarea, periodo);
        });
});

function renderGridNotas(notas, periodo) {

    if (notas.length === 0) {
        document.getElementById("gridNotasxestudiantexasignatura").innerHTML = "<p>No hay notas registradas.</p>";
        return;
    }

    // -------------------------------
    // ARMAR ENCABEZADO SEGÚN PERIODO
    // -------------------------------
    let columns = `
        <th>Code</th>
        <th>Materia</th>
    `;

    if (periodo == "PER1"){
        columns += `
        <th>1erPer</th>
        <th>Obspe1</th>
        `;
    }

        if (periodo === "PER2") {
        columns += `
        <th>1erPer</th>
        <th>2doPer</th>
        <th>Obspe2</th>
        `;
    }

    if (periodo === "PER3") {
        columns += `
        <th>1erPer</th>
        <th>2doPer</th>
        <th>3erPer</th>
        <th>Obspe3</th>`;
    }

    columns += `
        
    `;

    if (periodo === "PER1") {
        columns += `
        <th>Concepto Formativo</th>
        <th>Promedio1</th>
        <th>Obsprom</th>
        `;
    }
    
    if (periodo === "PER2") {
        columns += `
        <th>Concepto Formativo</th>
        <th>Promedio1</th>
        <th>Promedio2</th>
        <th>Obsprom2</th>`;
    }

    if (periodo === "PER3") {
        columns += `
            <th>Concepto Formativo</th>
            <th>Promedio1</th>
            <th>Promedio2</th>
            <th>Promedio3</th>
            <th>Obsprom3</th>
        `;
    }


    // -------------------------------
    // ARMAR CUERPO
    // -------------------------------

    let rows = "";

    notas.forEach(n => {

        // concepto formativo depende del periodo
        const conceptoFormativo = (periodo === "PER2") ? (n.rempe2 || "") : (n.rempe3 || "");

        rows += `
            <tr>
                <td>${n.codemate}</td>
                <td>${n.nombre}</td>
        `;

        if (periodo === "PER1") {
            rows += `
            <td>${n.nota1 || ""}</td>
            <td>${n.obstxt1 || ""}</td>
            `;
        }

        if (periodo === "PER2") {
            rows += `
            <td>${n.nota1 || ""}</td>
            <td>${n.nota2 || ""}</td>
            <td>${n.obstxt2 || "" }</td>
            `;
        }

        if (periodo === "PER3") {
            rows += `
            <td>${n.nota1 || ""}</td>
            <td>${n.nota2 || ""}</td>
            <td>${n.nota3 || ""}</td>
            <td>${n.obstxt3 || "" }</td>
            `;
        }

        rows += `


            
        `;

        if (periodo === "PER1") {
            rows += `
            <td>${n.rempe1}</td>
            <td>${n.promedio || ""}</td>
            <td>${n.obstxtpro1 }</td>
            `;
        }

        if (periodo === "PER2") {
            rows += `
            <td>${n.rempe2}</td>
            <td>${n.promedio || ""}</td>
            <td>${n.promedio2 || ""}</td>
            <td>${n.obstxtpro2 }</td>
            `;
        }

        if (periodo === "PER3") {
            rows += `
                <td>${n.rempe3}</td>
                <td>${n.promedio || ""}</td>
                <td>${n.promedio2 || ""}</td>
                <td>${n.promedio3 || ""}</td>
                <td>${n.obstxtpro3 }</td>
            `;
        }


    });

    // -------------------------------
    // TABLA FINAL
    // -------------------------------
    let html = `
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>${columns}</tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>
    `;

    document.getElementById("gridNotasxestudiantexasignatura").innerHTML = html;
}

</script>

<script>
function renderGridNotasArea(notasxarea, periodo) {

    //const periodo = window.periodoGlobal;  // ← Debe tener PER1, PER2 o PER3.

    if (!notasxarea || notasxarea.length === 0) {
        document.getElementById("gridNotasxestudiantexarea").innerHTML =
            "<p>No hay notas por área.</p>";
        return;
    }

    let rows = "";

    notasxarea.forEach(a => {
        rows += `
            <tr>
                <td>${a.codearea}</td>
                <td>${a.nombre}</td>
                <td>${a.per1 || ""}</td>
        `;

        // PER2 o PER3 muestran Per2
        if (periodo === "PER2") {
            rows += `<td>${a.per2 || ""}</td>`;
        }

        // solo PER3 muestra Per3
        if (periodo === "PER3") {
            rows += `
            <td>${a.per2 || ""}</td>
            <td>${a.per3 || ""}</td>`;
        }

        // NotaFinalP1 SIEMPRE
        rows += `<td>${a.NotaFinal || ""}</td>`;

        // NotaFinalP2 solo PER2 o PER3
        if (periodo === "PER2") {
            rows += `<td>${a.notafinal2 || ""}</td>`;
        }

        // NotaFinalP3 solo PER3
        if (periodo === "PER3") {
            rows += `
            <td>${a.notafinal2 || ""}</td>
            <td>${a.notafinal3 || ""}</td>`;
        }

        rows += `</tr>`;
    });

    // ENCABEZADO
    let header = `
        <tr>
            <th>Código</th>
            <th>Área</th>
            <th>Per1</th>
    `;

    if (periodo === "PER2" ) {
        header += `<th>Per2</th>`;
    }

    if (periodo === "PER3") {
        header += `
        <th>Per2</th>
        <th>Per3</th>`;
    }

    header += `<th>NotaFinalP1</th>`;

    if (periodo === "PER2") {
        header += `<th>NotaFinalP2</th>`;
    }

    if (periodo === "PER3") {
        header += `
        <th>NotaFinalP2</th>
        <th>NotaFinalP3</th>`;
    }

    header += `</tr>`;

    // TABLA COMPLETA
    let html = `
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                ${header}
            </thead>
            <tbody>
                ${rows}
            </tbody>
        </table>
    `;

    document.getElementById("gridNotasxestudiantexarea").innerHTML = html;
}
</script>

{% endblock %}
